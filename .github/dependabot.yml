version: 2

updates:
  # GitHub Actions ecosystem
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci-cd"
      - "automated pr"
    open-pull-requests-limit: 3
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # npm ecosystem
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "automated pr"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "@playwright/test"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
