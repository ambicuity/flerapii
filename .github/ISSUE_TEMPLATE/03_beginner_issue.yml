name: "🐥 Beginner Issue"
description: A task for contributors who have completed at least one Good First Issue and are ready to work more independently
title: "[Beginner]: "
labels: ["beginner", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ---
        **For issue creators:** Beginner issues sit between Good First Issues and Intermediate issues.
        The contributor should need to read existing code, understand a pattern, and make a
        small decision — but not design a solution from scratch.

        If a step-by-step recipe would suffice, it belongs in a Good First Issue.
        If it requires understanding multiple interacting systems, it belongs in Intermediate.
        ---

  - type: textarea
    id: before_you_start
    attributes:
      label: "🐥 Beginner Friendly"
      description: Pre-filled context for contributors — leave as-is unless the task has specific prerequisites.
      value: |
        Welcome! This is a **Beginner Issue** — a natural next step after Good First Issues.

        It expects you to:
        - Read existing code and follow its patterns
        - Own a small implementation decision
        - Write or extend tests

        **Difficulty:**
        - Basic TypeScript/JavaScript (reading and writing functions) required
        - No external API experience needed
        - Familiarity with the contribution workflow expected

        > [!IMPORTANT]
        > We recommend completing at least one Good First Issue before attempting a Beginner Issue.
        >
        > **You must be assigned before starting** — comment `/assign` to claim this issue.
        > PRs submitted without a prior assignment will be closed.

        > [!TIP]
        > **You should be comfortable with:**
        > - Forking, branching, committing, and opening a PR without a tutorial
        > - Reading TypeScript code you did not write and following its patterns
        > - Running `pnpm test` and fixing failures before pushing
        > - Rebasing onto `main` to resolve merge conflicts
        > - Looking things up on your own before asking for help
        >
        > If any of that feels new, start with a
        > [Good First Issue](https://github.com/ambicuity/flerapii/issues?q=is%3Aissue+state%3Aopen+label%3A%22good+first+issue%22+no%3Aassignee)
        > first. You can always come back.

        **Support:** The maintainer actively monitors this issue and will respond to questions.
        ⏱️ Typical time to complete: 2–4 hours
        🧩 Difficulty: Requires investigation and testing
        🎓 Best for: Contributors ready to work past copy-paste solutions

        ---
        🏁 **When this issue is complete, you will have:**
        - ✅ Improved your knowledge of the Flerapii extension codebase
        - ✅ Owned an implementation decision
        - ✅ Written or extended tests
    validations:
      required: false

  - type: textarea
    id: task
    attributes:
      label: "👾 Description of the Issue"
      description: |
        Describe what needs to change and why. Include which file(s) to look at, what the current
        behavior is, and what the desired behavior is. Do NOT write a step-by-step recipe — point
        contributors toward the right area and let them figure out the approach.
        Provide enough context so contributors can judge whether they are ready for this.
      value: |
        _Replace this with the task description._

        **Before claiming:**
        - Check the issue labels to see what area this touches
        - If this feels like too big a step, try a Good First Issue first
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ Acceptance Criteria"
      description: What must be true for this issue to be considered complete?
      value: |
        - [ ] The change is implemented in the correct file/function
        - [ ] Edge cases are handled (undefined, empty string, null)
        - [ ] All existing tests pass (`pnpm test`)
        - [ ] New tests are added covering the changed behavior
        - [ ] PR is linked to this issue with `Fixes #`
        - [ ] PR title follows Conventional Commits format
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "🏗️ Which area does this touch?"
      options:
        - "🧩 Extension logic (src/)"
        - "⚙️ Configuration (src/config/)"
        - "🌐 Popup / UI (src/entrypoints/popup/)"
        - "🔁 Background service worker (src/background/)"
        - "🧪 Tests (tests/ or e2e/)"
        - "📚 Documentation (*.md, docs/)"
        - "🛠️ Tooling / CI-CD (.github/workflows/)"
        - "Other"
    validations:
      required: true
