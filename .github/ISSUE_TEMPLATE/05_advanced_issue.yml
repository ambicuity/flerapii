name: "🧠 Advanced Issue"
description: A high-impact task for contributors with deep familiarity with the extension codebase
title: "[Advanced]: "
labels: ["advanced", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ---
        ## Thanks for contributing! 🚀

        This template is for **Advanced Issues** - work that requires deep familiarity with the
        Flerapii extension and confidence making changes that may span multiple components or
        affect core behavior (balance fetching, check-in logic, key management).
        ---

  - type: textarea
    id: intro
    attributes:
      label: "🧠 Advanced Contributors"
      description: Who is this issue for?
      value: |
        This issue is for contributors who are already very familiar with this codebase.
        You should feel comfortable:

        - Understanding the full extension data flow
        - Reading and modifying background service worker logic
        - Navigating src/background/, src/entrypoints/, and src/composables/
        - Reasoning about API contract changes (New API providers)
        - Writing rigorous, deterministic tests without live network calls (pnpm test)
        - Ensuring pnpm lint and pnpm compile and pnpm build all pass

        > [!IMPORTANT]
        > **You must be assigned before starting** - comment /assign to claim this issue.
        > PRs submitted without a prior assignment will be closed.

        New contributors should start with Good First Issues or Beginner Issues first.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        > [!WARNING]
        > ### What we consider an Advanced Issue in this repo
        >
        > This issue typically:
        > - Requires deep understanding of the extension architecture
        > - May touch shared utilities used across multiple providers
        > - May involve non-trivial refactors or behavior extensions
        > - Has medium to high risk if implemented incorrectly
        > - Requires backward compatibility with stored data schema
        > - Requires updating tests, CI, and documentation together
        >
        > **What this issue is NOT:**
        > - A simple config addition or label fix
        > - A narrowly scoped utility function change
        > - A task solvable by following an existing pattern

  - type: textarea
    id: problem
    attributes:
      label: "🐞 Problem Description"
      description: Describe the problem in depth.
      value: |
        Describe the problem here.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "💡 Proposed / Expected Solution"
      description: Describe the intended direction or design.
      value: |
        Describe the proposed solution here.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ Acceptance Criteria"
      description: What must be true for this issue to be considered complete?
      value: |
        - [ ] All described behavior changes are implemented correctly
        - [ ] Async safety is preserved (no unhandled promise rejections or race conditions)
        - [ ] All edge cases handled: undefined, null, empty string, malformed API responses
        - [ ] All existing tests pass (`pnpm test`)
        - [ ] New tests added for every changed code path (deterministic - no live network calls)
        - [ ] `pnpm lint && pnpm compile` passes
        - [ ] `pnpm build` completes successfully
        - [ ] Stored data schema remains backward compatible
        - [ ] PR is linked to this issue with `Fixes #`
        - [ ] PR title follows Conventional Commits format
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "🏗️ Which area does this touch?"
      options:
        - "🧩 Extension logic (src/)"
        - "⚙️ Configuration (src/config/)"
        - "🌐 Popup / UI (src/entrypoints/popup/)"
        - "🔁 Background service worker (src/background/)"
        - "🧪 Tests (tests/ or e2e/)"
        - "📚 Documentation (*.md, docs/)"
        - "🛠️ Tooling / CI-CD (.github/workflows/)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "🔗 Additional Context"
      description: Links to relevant code, API docs, related functions, or error logs.
      placeholder: |
        - Function: fetchBalance() at src/background/index.ts
        - Related: checkIn() at src/background/checkin.ts
        - Prior discussion: #42
