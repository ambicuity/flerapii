name: Validate Job Submissions

on:
  pull_request:
    paths:
      - 'config.yml'
      - 'jobs.json'

permissions: read-all
jobs:
  validate:
    name: Validate Payload Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate config
        run: python test_config.py

      - name: Validate jobs format
        run: |
          python - <<'EOF'
          import json, sys, os
          if os.path.exists("jobs.json"):
              with open("jobs.json") as f:
                  data = json.load(f)
              # jobs.json can be a dict with 'meta' and 'jobs' keys, or a flat list
              if isinstance(data, dict):
                  if "jobs" not in data:
                      print("Error: jobs.json dict missing 'jobs' key")
                      sys.exit(1)
                  jobs = data["jobs"]
              elif isinstance(data, list):
                  jobs = data
              else:
                  print("Error: jobs.json must be a list or dict with 'jobs' key")
                  sys.exit(1)
              for job in jobs:
                  if not isinstance(job, dict):
                      print("Error: malformed job inside jobs.json")
                      sys.exit(1)
              print(f"✅ jobs.json is valid with {len(jobs)} items.")
          EOF
