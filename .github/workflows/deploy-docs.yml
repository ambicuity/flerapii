name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/docs/**" # matches all doc content and config under /docs/docs/ (including .vuepress/, config.js, etc.)
      - "docs/package.json" # matches /docs/package.json (where dependencies are defined)
      - "docs/pnpm-lock.json" # matches /docs/pnpm-lock.json (where dependency versions are locked)

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs # all run commands execute in this directory

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # If your docs require Git submodules, uncomment the next line
          # submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build docs
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          # working-directory is docs, so this runs docs:build from docs/package.json
          # build output is at docs/docs/.vuepress/dist (relative to repo root)
          pnpm run docs:build
          # create .nojekyll to prevent GitHub Pages from processing Jekyll
          > docs/.vuepress/dist/.nojekyll
          # configure custom domain for GitHub Pages
          echo "flerapii.riteshrana.engineer" > docs/.vuepress/dist/CNAME

      - name: Deploy docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # target branch to deploy to
          # the folder to deploy, relative to the repository root
          folder: docs/docs/.vuepress/dist
