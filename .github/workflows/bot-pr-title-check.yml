name: PR Title Check (Conventional Commits)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: read-all

jobs:
  title-check:
    name: Validate PR Title Format
    permissions:
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.pull_request.title
            const author = context.payload.pull_request.user.login
            const prNumber = context.payload.pull_request.number
            const owner = context.repo.owner
            const repo = context.repo.repo

            const CONVENTIONAL = /^(feat|fix|docs|style|refactor|test|chore|ci|perf|revert|build)(\([a-zA-Z0-9_-]+\))?!?:\s.+/
            const EXEMPT_USERS = ["ambicuity", "dependabot[bot]", "github-actions[bot]"]

            if (EXEMPT_USERS.includes(author)) {
              core.info(`Exempting PR by ${author}.`)
              return
            }

            if (CONVENTIONAL.test(title)) {
              core.info(`PR title is valid: "${title}"`)
              return
            }

            const message = [
              "## PR Title Does Not Follow Conventional Commits",
              "",
              `Current title: \`${title}\``,
              "",
              "**Required format:** `<type>(<scope>): <description>`",
              "",
              "Examples:",
              "- `feat(dashboard): add bulk balance refresh`",
              "- `fix(export): handle missing API key on export`",
              "- `chore(ci): pin actions versions`",
              "",
              "Please edit the PR title. This check will rerun automatically.",
            ].join("\n")

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(
              (c) =>
                c.user.login === "github-actions[bot]" &&
                c.body.includes("PR Title Does Not Follow Conventional Commits")
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: message,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: message,
              })
            }

            core.setFailed(`PR title "${title}" does not follow Conventional Commits format.`)
